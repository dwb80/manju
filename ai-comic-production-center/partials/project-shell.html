<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI漫剧工业化生产中心</title>
    <style id="theme-vars">
/* ============================================
   AI漫剧工业化生产中心 — Brand CSS
   Dark Editorial Creative Studio
   ============================================ */

:root,
.dark {
  /* --- Brand Primary Hue: Warm Terracotta --- */
  --acpc-color-1: #1A0F08;
  --acpc-color-2: #2A1810;
  --acpc-color-3: #3D2418;
  --acpc-color-4: #5C3624;
  --acpc-color-5: #7A4A30;
  --acpc-color-6: #995E3C;
  --acpc-color-7: #B86A3A;
  --acpc-color-8: #E8743C;
  --acpc-color-9: #F2855A;
  --acpc-color-10: #F5A882;

  /* --- Semantic Primary --- */
  --acpc-color-primary: #E8743C;
  --acpc-color-primary-hover: #F2855A;
  --acpc-color-primary-active: #D66230;
  --acpc-color-primary-tint: rgba(232, 116, 60, 0.12);
  --acpc-color-primary-tint-strong: rgba(232, 116, 60, 0.20);

  /* --- Dark Surface System --- */
  --acpc-color-bg: #0D0D11;
  --acpc-color-bg-deep: #08080B;
  --acpc-color-surface: #16161D;
  --acpc-color-surface-2: #1D1D26;
  --acpc-color-surface-3: #24242F;
  --acpc-color-surface-hover: #2A2A36;
  --acpc-color-overlay: rgba(13, 13, 17, 0.80);

  /* --- Borders --- */
  --acpc-color-border: #2A2A36;
  --acpc-color-border-light: #36363F;
  --acpc-color-border-strong: #454552;

  /* --- Text --- */
  --acpc-color-text: #EAEAEF;
  --acpc-color-text-secondary: #9494A0;
  --acpc-color-text-tertiary: #5F5F6E;
  --acpc-color-text-disabled: #3D3D48;
  --acpc-color-text-inverse: #0D0D11;
  --acpc-color-text-on-primary: #FFFFFF;

  /* --- State Colors (semantic only) --- */
  --state-success: #4ADE80;
  --state-success-tint: rgba(74, 222, 128, 0.12);
  --state-warning: #FBBF24;
  --state-warning-tint: rgba(251, 191, 36, 0.12);
  --state-error: #F87171;
  --state-error-tint: rgba(248, 113, 113, 0.12);
  --state-info: #60A5FA;
  --state-info-tint: rgba(96, 165, 250, 0.12);

  /* --- Radius Scale --- */
  --acpc-radius-sm: 4px;
  --acpc-radius-md: 8px;
  --acpc-radius-lg: 12px;
  --acpc-radius-full: 9999px;

  /* --- Typography --- */
  --acpc-font-display: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --acpc-font-body: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --acpc-font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  /* --- Spacing --- */
  --acpc-space-xs: 4px;
  --acpc-space-sm: 8px;
  --acpc-space-md: 12px;
  --acpc-space-lg: 16px;
  --acpc-space-xl: 24px;
  --acpc-space-2xl: 32px;
  --acpc-space-3xl: 48px;

  /* --- Shadows (floating layers only) --- */
  --acpc-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --acpc-shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
  --acpc-shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08);
  --acpc-shadow-floating: 0 8px 32px rgba(0, 0, 0, 0.32);
}

/* --- Base Reset --- */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--acpc-font-body);
  background-color: var(--acpc-color-bg);
  color: var(--acpc-color-text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 13px;
  line-height: 1.5;
}

/* --- Typography Classes --- */
.acpc-display {
  font-family: var(--acpc-font-display);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.acpc-h1 {
  font-family: var(--acpc-font-display);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.acpc-h2 {
  font-family: var(--acpc-font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.acpc-h3 {
  font-family: var(--acpc-font-display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.005em;
  line-height: 1.4;
}

.acpc-body {
  font-family: var(--acpc-font-body);
  font-weight: 400;
  font-size: 13px;
  line-height: 1.5;
}

.acpc-body-sm {
  font-family: var(--acpc-font-body);
  font-weight: 400;
  font-size: 12px;
  line-height: 1.5;
}

.acpc-label {
  font-family: var(--acpc-font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.4;
}

.acpc-mono {
  font-family: var(--acpc-font-mono);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: -0.01em;
}

.acpc-metric {
  font-family: var(--acpc-font-display);
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.03em;
  line-height: 1;
}

.acpc-metric-lg {
  font-family: var(--acpc-font-display);
  font-weight: 800;
  font-size: 36px;
  letter-spacing: -0.03em;
  line-height: 1;
}

/* --- Section Number (editorial) --- */
.acpc-section-num {
  font-family: var(--acpc-font-mono);
  font-weight: 600;
  font-size: 11px;
  color: var(--acpc-color-primary);
  letter-spacing: 0.08em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--acpc-background); color: var(--acpc-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- ===== Left Sidebar (220px fixed) ===== -->
        <aside class="hidden md:flex w-[220px] shrink-0 flex-col" style="background-color: var(--acpc-color-surface); border-right: 1px solid var(--acpc-color-border);">
            <!-- Logo -->
            <div class="h-12 shrink-0 flex items-center gap-2.5 px-4" style="border-bottom: 1px solid var(--acpc-color-border);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--acpc-color-primary); flex-shrink: 0;">
                    <rect width="18" height="18" x="3" y="3" rx="2"/>
                    <path d="M7 3v18"/>
                    <path d="M3 7.5h4"/>
                    <path d="M3 12h18"/>
                    <path d="M3 16.5h4"/>
                </svg>
                <span class="text-[15px] font-bold tracking-tight" style="color: var(--acpc-color-text);">ACPC</span>
            </div>
            <!-- Navigation -->
            <nav class="flex-1 overflow-y-auto px-3 py-3 flex flex-col gap-1 no-scrollbar">
                <!-- SLOT: activeNavItem -->
                <a data-nav-key="overview" data-dom-id="nav-overview" href="#" class="acpc-nav-item flex items-center gap-3 h-9 px-3 text-[13px] whitespace-nowrap" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-md);">
                    <svg class="acpc-nav-icon shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="9" x="3" y="3" rx="1"/>
                        <rect width="7" height="5" x="14" y="3" rx="1"/>
                        <rect width="7" height="9" x="14" y="12" rx="1"/>
                        <rect width="7" height="5" x="3" y="16" rx="1"/>
                    </svg>
                    <span>总览看板</span>
                </a>
                <a data-nav-key="projects" data-dom-id="nav-projects" href="#" class="acpc-nav-item flex items-center gap-3 h-9 px-3 text-[13px] whitespace-nowrap" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-md);">
                    <svg class="acpc-nav-icon shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
                    </svg>
                    <span>项目管理</span>
                </a>
                <a data-nav-key="pipeline" data-dom-id="nav-pipeline" href="#" class="acpc-nav-item flex items-center gap-3 h-9 px-3 text-[13px] whitespace-nowrap" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-md);">
                    <svg class="acpc-nav-icon shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="8" height="8" x="3" y="3" rx="2"/>
                        <path d="M7 11v4a2 2 0 0 0 2 2h4"/>
                        <rect width="8" height="8" x="13" y="13" rx="2"/>
                    </svg>
                    <span>生产流水线</span>
                </a>
                <a data-nav-key="workspace" data-dom-id="nav-workspace" href="#" class="acpc-nav-item flex items-center gap-3 h-9 px-3 text-[13px] whitespace-nowrap" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-md);">
                    <svg class="acpc-nav-icon shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m12 19 7-7 3 3-7 7-3-3z"/>
                        <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                        <path d="m2 2 7.586 7.586"/>
                        <circle cx="11" cy="11" r="2"/>
                    </svg>
                    <span>AI创作工作台</span>
                </a>
                <a data-nav-key="assets" data-dom-id="nav-assets" href="#" class="acpc-nav-item flex items-center gap-3 h-9 px-3 text-[13px] whitespace-nowrap" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-md);">
                    <svg class="acpc-nav-icon shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m16 6 4 14"/>
                        <path d="M12 6v14"/>
                        <path d="M8 8v12"/>
                        <path d="M4 4v16"/>
                    </svg>
                    <span>素材资产库</span>
                </a>
            </nav>
            <!-- User Profile -->
            <div class="p-3 shrink-0" style="border-top: 1px solid var(--acpc-color-border);">
                <div class="flex items-center gap-3 p-2" style="background-color: var(--acpc-color-surface-2); border-radius: var(--acpc-radius-md);">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background-color: var(--acpc-color-primary);">
                        <span class="text-[13px] font-semibold" style="color: var(--acpc-color-text-on-primary);">林</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[13px] font-medium truncate" style="color: var(--acpc-color-text);">林墨白</div>
                        <div class="text-[11px] truncate" style="color: var(--acpc-color-text-secondary);">制作总监</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ===== Main Area ===== -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Top Bar (48px) -->
            <header class="h-12 shrink-0 flex items-center gap-3 px-4 sm:px-6" style="background-color: var(--acpc-color-surface); border-bottom: 1px solid var(--acpc-color-border);">
                <!-- Mobile menu button -->
                <button class="md:hidden w-8 h-8 flex items-center justify-center" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-sm);">
                    <i data-lucide="menu" class="w-4 h-4"></i>
                </button>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-[12px] min-w-0" style="color: var(--acpc-color-text-secondary);">
                    <!-- SLOT: breadcrumb -->
                </div>
                <!-- Spacer -->
                <div class="flex-1"></div>
                <!-- Search -->
                <div class="relative hidden sm:block w-[240px]">
                    <i data-lucide="search" class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--acpc-color-text-tertiary);"></i>
                    <input type="text" placeholder="搜索项目、素材..." class="acpc-search-input w-full h-8 pl-8 pr-3 text-[13px]" style="background-color: var(--acpc-color-surface-2); border: 1px solid var(--acpc-color-border); color: var(--acpc-color-text); border-radius: var(--acpc-radius-sm);">
                </div>
                <!-- Notifications -->
                <button class="acpc-icon-btn relative w-8 h-8 flex items-center justify-center" style="color: var(--acpc-color-text-secondary); border-radius: var(--acpc-radius-sm);">
                    <i data-lucide="bell" class="w-4 h-4"></i>
                    <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 rounded-full" style="background-color: var(--acpc-color-primary);"></span>
                </button>
                <!-- Quick Action CTA -->
                <button class="acpc-cta-primary h-8 px-4 flex items-center justify-center gap-1.5 text-[13px] font-medium whitespace-nowrap" style="background-color: var(--acpc-color-primary); color: var(--acpc-color-text-on-primary); border-radius: var(--acpc-radius-md);">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>新建项目</span>
                </button>
            </header>
            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto" style="background-color: var(--acpc-color-bg);">
                <div class="p-6">
                    <!-- Page Title Area -->
                    <div class="mb-6">
                        <!-- SLOT: pageTitle -->
                    </div>
                    <!-- Content Wrapper -->
                    <div>
                        <!-- SLOT: mainContent -->
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- Custom shell styles (placed before </body> per free-explore rules) -->
    <style>
        .acpc-nav-item {
            transition: background-color 120ms cubic-bezier(.2,.8,.2,1), color 120ms cubic-bezier(.2,.8,.2,1);
        }
        .acpc-nav-item:hover {
            background-color: var(--acpc-color-surface-2);
            color: var(--acpc-color-text);
        }
        .acpc-nav-item[data-active="true"] {
            background-color: var(--acpc-color-primary-tint);
            color: var(--acpc-color-primary);
        }
        .acpc-nav-item:focus-visible {
            outline: 2px solid var(--acpc-color-primary);
            outline-offset: -2px;
        }
        .acpc-icon-btn {
            transition: background-color 120ms cubic-bezier(.2,.8,.2,1), color 120ms cubic-bezier(.2,.8,.2,1);
        }
        .acpc-icon-btn:hover {
            background-color: var(--acpc-color-surface-2);
            color: var(--acpc-color-text);
        }
        .acpc-icon-btn:focus-visible {
            outline: 2px solid var(--acpc-color-primary);
            outline-offset: -2px;
        }
        .acpc-search-input {
            transition: border-color 120ms cubic-bezier(.2,.8,.2,1);
        }
        .acpc-search-input:focus {
            border-color: var(--acpc-color-primary);
            outline: none;
        }
        .acpc-search-input::placeholder {
            color: var(--acpc-color-text-tertiary);
        }
        .acpc-cta-primary {
            transition: background-color 120ms cubic-bezier(.2,.8,.2,1);
        }
        .acpc-cta-primary:hover {
            background-color: var(--acpc-color-primary-hover);
        }
        .acpc-cta-primary:active {
            background-color: var(--acpc-color-primary-active);
        }
        .acpc-cta-primary:focus-visible {
            outline: 2px solid var(--acpc-color-primary);
            outline-offset: 2px;
        }
        @media (prefers-reduced-motion: reduce) {
            .acpc-nav-item,
            .acpc-icon-btn,
            .acpc-search-input,
            .acpc-cta-primary {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
