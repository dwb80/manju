# SEC-SUP-03 容器镜像扫描（Trivy）

name: trivy-scan

on:
  push:
    branches: [main, release/*]
    paths:
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.github/workflows/trivy-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose*.yml'
  schedule:
    # 每周一 02:00 UTC 定时扫描
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  scan-image:
    name: Trivy 镜像扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          docker build -t agnes-ai/backend:scan-${{ github.sha }} -f Dockerfile .

      - name: Trivy 扫描（critical/high 阻断）
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: agnes-ai/backend:scan-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: 上传 SARIF 到 Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: 输出文本报告（comment PR）
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: agnes-ai/backend:scan-${{ github.sha }}
          format: 'table'
          output: 'trivy-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: 读取并评论 PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('trivy-report.txt', 'utf8');
            const truncated = report.length > 60000 ? report.substring(0, 60000) + '\n...（已截断）' : report;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Trivy 镜像扫描报告\n\n\`\`\`\n${truncated}\n\`\`\``
            });

  scan-fs:
    name: Trivy 文件系统扫描（fsroot）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS 扫描
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
